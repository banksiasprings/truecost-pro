name: Android Emulator Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles("android-twa/gradle/wrapper/gradle-wrapper.properties") }}
          restore-keys: |
            gradle-wrapper-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles("android-twa/**/*.gradle", "android-twa/**/*.gradle.kts") }}
          restore-keys: |
            gradle-caches-

      - name: Make gradlew executable
        run: chmod +x android-twa/gradlew

      - name: Build debug APK
        run: |
          cd android-twa
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android-twa -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "APK built at: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Enable KVM group perms
        run: |
          echo KERNEL=="kvm", GROUP=="kvm", MODE=="0666", OPTIONS+="static_node=kvm" | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android emulator and smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_4
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Emulator booted ==="
            adb devices
            echo "=== Installing APK ==="
            adb install -r ${{ steps.apk.outputs.apk_path }}
            echo "=== Launching TrueCost TWA ==="
            adb shell am start -n au.com.banksiasprings.truecost/.LauncherActivity
            sleep 5
            echo "=== Checking process is alive ==="
            adb shell pidof au.com.banksiasprings.truecost || true
            echo "=== Checking for fatal crashes ==="
            adb logcat -d -s AndroidRuntime:E | grep -i FATAL || echo "No fatal crashes detected"
            echo "=== Smoke test complete: APK installed and activity started ==="

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truecost-debug-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 7
