name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Make gradlew executable
        run: chmod +x android-twa/gradlew

      - name: Build debug APK
        run: |
          cd android-twa
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        run: |
          find android-twa -name '*.apk' | head -5
          APK=$(find android-twa -name '*.apk' | head -1)
          cp "$APK" truecost.apk
          echo "APK size: $(du -sh truecost.apk)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: truecost-android-apk
          path: truecost.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: 'TRUE COST - Android App'
          body: |
            ## Install TRUE COST on Android

            1. Download **truecost.apk** below
            2. Open the file on your Android phone
            3. If prompted, enable **Install from unknown sources** in Settings
            4. Tap **Install**

            Requires Android 5.0+ with Chrome installed.
            Direct APK install - no Play Store required.
          files: truecost.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
