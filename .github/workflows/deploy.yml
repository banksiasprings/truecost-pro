name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Auto-bump service worker cache version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_NAME = 'truecost-pro-v[^']*'/const CACHE_NAME = 'truecost-pro-${SHORT_SHA}'/" src/sw.js
          echo "Cache name set to truecost-pro-${SHORT_SHA}"
      - name: Upload artifact (src/ directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
